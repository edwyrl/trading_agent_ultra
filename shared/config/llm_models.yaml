models:
  - model_id: openai.gpt-4.1
    provider: openai
    api_model: gpt-4.1
    capabilities: [reasoning, long_context, tool_calling]
    max_input_tokens: 1047576
    max_output_tokens: 32768
    description: OpenAI balanced reasoning model

  - model_id: openai.gpt-4.1-mini
    provider: openai
    api_model: gpt-4.1-mini
    capabilities: [fast, summarize, tool_calling]
    max_input_tokens: 1047576
    max_output_tokens: 32768
    description: OpenAI lower latency model for drafts and summaries

  - model_id: anthropic.claude-3-7-sonnet
    provider: anthropic
    api_model: claude-3-7-sonnet-latest
    capabilities: [reasoning, analysis, writing]
    max_input_tokens: 200000
    max_output_tokens: 8192
    description: Anthropic long-form analysis model

  - model_id: moonshot.kimi-k2
    provider: moonshot
    api_model: kimi-k2-0711-preview
    capabilities: [long_context, chinese, fast]
    max_input_tokens: 128000
    max_output_tokens: 8192
    description: Moonshot Chinese long context model

  - model_id: siliconflow.qwen2_5_32b
    provider: siliconflow
    api_model: Qwen/Qwen2.5-32B-Instruct
    capabilities: [chinese, reasoning, cost_effective]
    max_input_tokens: 128000
    max_output_tokens: 8192
    description: SiliconFlow hosted domestic model (OpenAI-compatible endpoint)

roles:
  research:
    model_id: openai.gpt-4.1
    temperature: 0.2
    max_output_tokens: 4096
  summarize:
    model_id: openai.gpt-4.1-mini
    temperature: 0.1
    max_output_tokens: 2048
  final_report:
    model_id: anthropic.claude-3-7-sonnet
    temperature: 0.2
    max_output_tokens: 4096
  fast_draft:
    model_id: moonshot.kimi-k2
    temperature: 0.3
    max_output_tokens: 2048
  macro_editor:
    model_id: openai.gpt-4.1-mini
    temperature: 0.1
    max_output_tokens: 256
    system_prompt: >
      你是宏观研究编辑。输出简洁、可执行，聚焦事件对资产变量与政策预期的影响。
  macro_summarizer:
    model_id: openai.gpt-4.1-mini
    temperature: 0.1
    max_output_tokens: 512
    system_prompt: >
      你是宏观新闻整合分析师。必须基于输入证据做结构化归纳，禁止编造来源和事实。
  cn_research:
    model_id: siliconflow.qwen2_5_32b
    temperature: 0.2
    max_output_tokens: 2048
